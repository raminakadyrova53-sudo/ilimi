    </div>
    <div id="cartModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('cartModal')">&times;</span><h3>🛍️ Корзина</h3><div id="cartItemsList"></div><div id="cartTotal"></div><div><label>📍 Адрес доставки:</label><span id="savedAddress"></span><button id="editAddressBtn" class="btn" style="width:auto;padding:8px 16px;">✏️ Изменить</button></div><div id="addressInputDiv" style="display:none;"><input type="text" id="deliveryAddress" placeholder="Улица, дом, квартира"><button id="saveAddressBtn" class="btn" style="width:auto;padding:8px 16px;">Сохранить</button></div><button class="btn" id="checkoutBtn" style="margin-top:15px;">✅ Оформить заказ</button></div></div>
    <div id="authModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('authModal')">&times;</span><h3>Добро пожаловать</h3><div id="savedAccountsList" class="saved-accounts"></div><div class="flex-between"><button id="loginTab" class="btn" style="width:auto;">Вход</button><button id="registerTab" class="btn" style="width:auto;">Регистрация</button></div>
    <div id="loginForm"><input type="text" id="loginUsername" placeholder="Логин" autocomplete="username"><div class="password-wrapper"><input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password"><span class="password-toggle" onclick="togglePassword('loginPassword')"><i class="far fa-eye"></i></span></div><div class="forgot-link" id="forgotPasswordLink">Забыли пароль?</div><button id="doLoginBtn" class="btn">Войти</button></div>
    <div id="registerForm" style="display:none;"><input type="text" id="regUsername" placeholder="Логин *"><input type="password" id="regPassword" placeholder="Пароль *"><input type="email" id="regEmail" placeholder="Email"><input type="tel" id="regPhone" placeholder="Телефон"><button id="doRegisterBtn" class="btn">Зарегистрироваться</button></div></div></div>
    <div id="restoreModal" class="modal"><div class="modal-content"><span class="modal-close" onclick="closeModal('restoreModal')">&times;</span><h3>Восстановление</h3><input type="text" id="restoreContact" placeholder="Email или телефон"><button id="doRestoreBtn" class="btn">Восстановить</button></div></div>
</div>

<script>
    // ======================== FIREBASE CONFIG ========================
    // ⚠️ ЗАМЕНИТЕ НА ВАШИ ДАННЫЕ ИЗ КОНСОЛИ FIREBASE ⚠️
    const firebaseConfig = {
        apiKey: "ВАШ_API_KEY",
        authDomain: "ВАШ_ПРОЕКТ.firebaseapp.com",
        projectId: "ВАШ_ПРОЕКТ",
        storageBucket: "ВАШ_ПРОЕКТ.appspot.com",
        messagingSenderId: "ВАШ_ID",
        appId: "ВАШ_APP_ID"
    };
    
    // Инициализация
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();

    // ======================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========================
    let products = [];          // будет заполняться из Firestore
    let currentUser = null;    // объект { username, email, phone, address, avatar, isAdmin, uid }
    let cart = [];             // корзина только локально, сохраняется в сессии (или можно в Firestore? оставим локально)
    let orders = [];           // из Firestore
    let reviews = [];          // из Firestore
    let privateMessages = {};  // сообщения по username, подгружаются динамически
    let productComments = {};  // комментарии к товарам, подгружаются по productId
    let messageReadStatus = {}; // статус прочтения (хранится в сессии или в localStorage, но для простоты оставим локально)
    
    let currentCategory = "Корпусные десерты";
    const categories = ["Десерты", "Напитки", "Корпусные десерты", "Макаруны", "Мороженое"];
    let currentAdminTab = "orders";
    let currentPage = "menu";
    let currentProductsSubTab = "add";
    let currentOrderFilter = "active";
    let currentChatUser = null;
    let menuSearchQuery = "";
    let debounceTimer = null;
    
    // Отключение localStorage данных, теперь всё из Firebase
    function getShortId(fullId) { return fullId.slice(-5); }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    // ======================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ========================
    function updateCartCount() { 
        let badge = document.getElementById("floatingCartCount");
        if(badge) badge.innerText = cart.reduce((s,i)=>s+i.quantity,0);
        localStorage.setItem("ilimi_cart_session", JSON.stringify(cart));
    }
    
    // Загрузка корзины из sessionStorage
    function loadCartFromSession() {
        let saved = localStorage.getItem("ilimi_cart_session");
        if(saved) cart = JSON.parse(saved);
        else cart = [];
        updateCartCount();
    }
    
    // Сохранение корзины в sessionStorage (не в облако)
    function saveCartSession() {
        localStorage.setItem("ilimi_cart_session", JSON.stringify(cart));
    }
    
    // ======================== ЗАГРУЗКА ДАННЫХ ИЗ FIRESTORE В РЕАЛЬНОМ ВРЕМЕНИ ========================
    function subscribeToProducts() {
        db.collection("products").onSnapshot(snapshot => {
            products = [];
            snapshot.forEach(doc => {
                products.push({ id: doc.id, ...doc.data() });
            });
            // Если меню открыто, обновить
            if (currentPage === "menu") renderMenu();
            if (currentUser && currentUser.isAdmin && currentAdminTab === "products") renderAdminPanel();
        });
    }
    
    function subscribeToOrders() {
        if (!currentUser) return;
        let query = db.collection("orders");
        if (!currentUser.isAdmin) {
            query = query.where("userId", "==", currentUser.uid);
        }
        query.onSnapshot(snapshot => {
            orders = [];
            snapshot.forEach(doc => {
                orders.push({ id: doc.id, ...doc.data() });
            });
            if (currentPage === "orders") renderUserOrders();
            if (currentUser && currentUser.isAdmin) {
                if (currentAdminTab === "orders") renderAdminPanel();
                updateAdminOrderBadge();
            }
            updateOrderStatusBar();
        });
    }
    
    function subscribeToReviews() {
        db.collection("reviews").orderBy("date", "desc").onSnapshot(snapshot => {
            reviews = [];
            snapshot.forEach(doc => {
                reviews.push({ id: doc.id, ...doc.data() });
            });
            if (currentPage === "reviews") renderReviews();
        });
    }
    
    // Подписка на комментарии к товарам (для модального окна)
    function subscribeToProductComments(productId, callback) {
        return db.collection("productComments").doc(productId).collection("comments").orderBy("date", "asc").onSnapshot(snapshot => {
            let comments = [];
            snapshot.forEach(doc => comments.push({ id: doc.id, ...doc.data() }));
            callback(comments);
        });
    }
    
    // Подписка на чат конкретного пользователя (для админа или пользователя)
    function subscribeToChat(chatId, isAdminSide, callback) {
        return db.collection("privateMessages").doc(chatId).collection("messages").orderBy("time", "asc").onSnapshot(snapshot => {
            let messages = [];
            snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
            callback(messages);
            // Отметить прочтение
            markMessagesRead(chatId, isAdminSide);
        });
    }
    
    async function markMessagesRead(chatId, isAdmin) {
        const messagesRef = db.collection("privateMessages").doc(chatId).collection("messages");
        let unreadQuery;
        if (isAdmin) {
            unreadQuery = messagesRef.where("readByAdmin", "==", false).where("from", "!=", "ilimi_admin");
        } else {
            unreadQuery = messagesRef.where("readByUser", "==", false).where("from", "==", "ilimi_admin");
        }
        const snap = await unreadQuery.get();
        const batch = db.batch();
        snap.forEach(doc => {
            batch.update(doc.ref, isAdmin ? { readByAdmin: true } : { readByUser: true });
        });
        await batch.commit();
    }
    
    // ======================== АВТОРИЗАЦИЯ ========================
    async function login(username, password) {
        try {
            // Ищем пользователя в коллекции users по username
            const userQuery = await db.collection("users").where("username", "==", username).get();
            if (userQuery.empty) { alert("Пользователь не найден"); return false; }
            const userDoc = userQuery.docs[0];
            const userData = userDoc.data();
            if (userData.password !== password) { alert("Неверный пароль"); return false; }
            currentUser = {
                uid: userDoc.id,
                username: userData.username,
                email: userData.email,
                phone: userData.phone,
                address: userData.address,
                avatar: userData.avatar,
                isAdmin: userData.isAdmin || false
            };
            // Сохраняем сессию в localStorage для простоты
            localStorage.setItem("ilimi_current_user", JSON.stringify({ uid: currentUser.uid }));
            closeModal('authModal');
            menuSearchQuery = "";
            // Загружаем корзину
            loadCartFromSession();
            // Подписываемся на данные
            subscribeToOrders();
            updateUI();
            updateOrderStatusBar();
            return true;
        } catch(e) { alert("Ошибка входа: " + e.message); return false; }
    }
    
    async function register(username, password, email, phone) {
        try {
            // Проверка уникальности username
            const existing = await db.collection("users").where("username", "==", username).get();
            if (!existing.empty) { alert("Логин уже существует"); return false; }
            // Создаём документ пользователя
            const newUserRef = db.collection("users").doc();
            await newUserRef.set({
                username, password, email, phone,
                address: "", avatar: null,
                isAdmin: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await login(username, password);
            return true;
        } catch(e) { alert("Ошибка регистрации: " + e.message); return false; }
    }
    
    function logout() {
        currentUser = null;
        localStorage.removeItem("ilimi_current_user");
        localStorage.removeItem("ilimi_cart_session");
        cart = [];
        updateUI();
        updateOrderStatusBar();
        alert("Вы вышли");
        location.reload(); // перезагрузка для сброса подписок
    }
    
    // ======================== ОСНОВНЫЕ ФУНКЦИИ ПРИЛОЖЕНИЯ ========================
    function updateUI() {
        const navLinks = document.getElementById("navLinks");
        const floatingCart = document.getElementById("floatingCart");
        const userChatWidget = document.getElementById("userChatWidget");
        const adminNavContainer = document.getElementById("adminNavContainer");
        document.getElementById("userNameDisplay").innerText = currentUser ? currentUser.username : "Войти";
        document.getElementById("userAvatar").src = currentUser?.avatar || "https://placehold.co/100x100/f2e6d8/8b5a3c?text=👤";
        
        if (currentUser?.isAdmin) {
            adminNavContainer.style.display = "block";
            const adminNav = document.getElementById("adminNavButtons");
            adminNav.innerHTML = `<button class="admin-nav-btn ${currentAdminTab === 'orders' ? 'active' : ''}" data-tab="orders"><i class="fas fa-truck-fast"></i> ЗАКАЗЫ</button>
                                   <button class="admin-nav-btn ${currentAdminTab === 'products' ? 'active' : ''}" data-tab="products"><i class="fas fa-cake-candles"></i> ТОВАРЫ</button>
                                   <button class="admin-nav-btn ${currentAdminTab === 'chats' ? 'active' : ''}" data-tab="chats"><i class="fas fa-comments"></i> ЧАТЫ</button>`;
            document.querySelectorAll(".admin-nav-btn").forEach(btn => {
                btn.onclick = () => {
                    currentAdminTab = btn.dataset.tab;
                    updateUI();
                    renderAdminPanel();
                };
            });
            if (navLinks) navLinks.style.display = "none";
            floatingCart.style.display = "none";
            if (userChatWidget) userChatWidget.style.display = "none";
            renderAdminPanel();
        } else {
            adminNavContainer.style.display = "none";
            if (navLinks) navLinks.style.display = "flex";
            floatingCart.style.display = currentUser ? "flex" : "none";
            if (userChatWidget) userChatWidget.style.display = currentUser ? "block" : "none";
            renderPage();
            if (currentUser) updateUserChatUnread();
        }
        updateCartCount();
        if(document.querySelectorAll(".nav-links a").length)
            document.querySelectorAll(".nav-links a").forEach(link => link.classList.toggle("active", link.dataset.page === currentPage));
    }
    
    function renderPage() {
        if (currentPage === "menu") renderMenu();
        else if (currentPage === "orders") renderUserOrders();
        else if (currentPage === "reviews") renderReviews();
    }
    
    async function renderMenu() {
        let searchHtml = `<div class="search-bar"><input type="text" id="menuSearchInput" placeholder="🔍 Поиск по меню..." oninput="filterMenuDebounced()" value="${menuSearchQuery.replace(/"/g, '&quot;')}" autocomplete="off"></div>`;
        let tabs = `<div class="categories-tabs">${categories.map(c => `<button class="category-tab ${currentCategory===c?'active':''}" data-category="${c}">${c}</button>`).join('')}</div>`;
        let filteredByCat = products.filter(p => p.category === currentCategory);
        let filteredBySearch = filteredByCat.filter(p => p.name.toLowerCase().includes(menuSearchQuery.toLowerCase()));
        let grid = `<div class="menu-grid">${filteredBySearch.map(p => `<div class="product-card" onclick="openProductDetail('${p.id}')"><div class="product-img" style="background-image: url('${p.image}');"></div><div class="product-info"><div><strong>${p.name}</strong></div><div>${p.price}₽</div><button class="btn" onclick="event.stopPropagation(); addToCart('${p.id}')">В корзину</button></div></div>`).join('')}</div>`;
        if(filteredBySearch.length === 0) grid = '<p style="text-align:center;padding:40px;">😢 Ничего не найдено</p>';
        document.getElementById("mainContent").innerHTML = searchHtml + tabs + grid;
        let searchInput = document.getElementById("menuSearchInput");
        if(searchInput) searchInput.value = menuSearchQuery;
        document.querySelectorAll(".category-tab").forEach(btn => btn.onclick = () => { currentCategory = btn.dataset.category; renderMenu(); });
    }
    
    function addToCart(pid) {
        if (!currentUser || currentUser.isAdmin) { alert("Войдите как клиент"); return; }
        let p = products.find(p => p.id === pid);
        let exist = cart.find(i => i.productId === pid);
        if (exist) exist.quantity++;
        else cart.push({ productId: pid, name: p.name, variantWeight: "стандарт", variantPrice: p.price, quantity: 1 });
        saveCartSession();
        renderMenu();
        updateCartCount();
    }
    
    async function checkout() {
        if (!currentUser) { alert("Войдите"); document.getElementById("authModal").style.display = "flex"; return; }
        let addr = currentUser.address;
        if (!addr) { alert("Укажите адрес в личном кабинете"); return; }
        if (cart.length === 0) { alert("Корзина пуста"); return; }
        let total = cart.reduce((s,i) => s + i.variantPrice * i.quantity, 0);
        let orderData = {
            userId: currentUser.uid,
            userName: currentUser.username,
            items: cart,
            total: total,
            address: addr,
            status: "Принят",
            date: new Date().toISOString(),
            viewed: false
        };
        await db.collection("orders").add(orderData);
        cart = [];
        saveCartSession();
        updateCartCount();
        closeModal('cartModal');
        alert("✅ Заказ оформлен!");
        renderPage();
        updateOrderStatusBar();
    }
    
    async function renderUserOrders() {
        if (!currentUser) { document.getElementById("mainContent").innerHTML = '<p>Войдите в аккаунт</p>'; return; }
        let userOrders = orders.filter(o => o.userId === currentUser.uid);
        let html = `<h2 style="margin-bottom:20px;">📋 Мои заказы</h2>${userOrders.map(o => `<div class="order-card" onclick="showOrderDetail('${o.id}')"><div class="flex-between"><b>${getShortId(o.id)}</b> <span class="status-badge status-${o.status}">${o.status}</span></div>📅 ${new Date(o.date).toLocaleString()}<br>💰 ${o.total}₽<br><button class="repeat-order-btn" onclick="event.stopPropagation(); repeatOrder('${o.id}')">🔄 Повторить заказ</button></div>`).join('') || '<p>У вас пока нет заказов</p>'}`;
        document.getElementById("mainContent").innerHTML = html;
    }
    
    function showOrderDetail(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="modal-close" onclick="this.closest('.modal').remove()">&times;</span><h3>📦 Заказ ${getShortId(order.id)}</h3><p><strong>Статус:</strong> <span class="status-badge status-${order.status}">${order.status}</span></p><p><strong>Дата:</strong> ${new Date(order.date).toLocaleString()}</p><p><strong>Адрес:</strong> ${order.address}</p><p><strong>Сумма:</strong> ${order.total}₽</p><h4>Состав:</h4>${order.items.map(i=>`<div>• ${i.name} x${i.quantity} = ${i.variantPrice*i.quantity}₽</div>`).join('')}<button class="repeat-order-btn" onclick="repeatOrder('${order.id}'); this.closest('.modal').remove();">🔄 Повторить заказ → в корзину</button><button class="btn" style="margin-top:10px;" onclick="this.closest('.modal').remove()">Закрыть</button></div>`;
        document.body.appendChild(modal);
    }
    
    async function repeatOrder(orderId) {
        let order = orders.find(o => o.id === orderId);
        if (order) {
            cart = order.items.map(item => ({ ...item }));
            saveCartSession();
            alert("Товары добавлены в корзину!");
            renderCartModal();
            updateCartCount();
            renderMenu();
        }
    }
    
    async function updateOrderStatus(orderId, newStatus) {
        await db.collection("orders").doc(orderId).update({ status: newStatus });
    }
    
    function renderCartModal() {
        let total=0, html='';
        cart.forEach((i,idx)=>{ total+=i.variantPrice*i.quantity; html+=`<div class="cart-item"><div class="flex-between"><div><b>${i.name}</b></div><div class="cart-item-controls"><button onclick="updateCartItem(${idx},'dec')">-</button><span class="cart-item-count">${i.quantity}</span><button onclick="updateCartItem(${idx},'inc')">+</button><button onclick="updateCartItem(${idx},'del')"><i class="fas fa-trash-alt"></i></button></div></div><div>${i.variantPrice}₽ x ${i.quantity} = ${i.variantPrice*i.quantity}₽</div></div>`; });
        document.getElementById("cartItemsList").innerHTML=html||"<p>Корзина пуста</p>";
        document.getElementById("cartTotal").innerHTML=total?`<strong>Итого: ${total}₽</strong>`:'';
        document.getElementById("savedAddress").innerText = currentUser?.address || "Не указан";
        document.getElementById("addressInputDiv").style.display = "none";
        document.getElementById("cartModal").style.display="flex";
    }
    
    function updateCartItem(idx, op) {
        if (op === "inc") cart[idx].quantity++;
        else if (op === "dec") { if (cart[idx].quantity > 1) cart[idx].quantity--; else cart.splice(idx,1); }
        else cart.splice(idx,1);
        saveCartSession();
        renderCartModal();
        renderMenu();
        updateCartCount();
    }
    
    async function addReview(rating, text) {
        if (!currentUser || currentUser.isAdmin) return;
        await db.collection("reviews").add({
            author: currentUser.username,
            rating: rating,
            text: text,
            date: new Date().toISOString()
        });
    }
    
    function renderReviews() {
        let starsHtml = `<div class="stars" id="reviewStars">${[1,2,3,4,5].map(v => `<span class="star" data-value="${v}">★</span>`).join('')}</div>`;
        let html = `<div>${reviews.map(r => `<div class="review-card"><b>${r.author}</b> <small>${new Date(r.date).toLocaleString()}</small><div>${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div><div>${r.text}</div></div>`).join('') || '<p>Нет отзывов</p>'}</div><div style="margin-top:30px;"><h4>Оставить отзыв</h4>${starsHtml}<textarea id="reviewText" rows="3" placeholder="Ваш отзыв..."></textarea><button id="submitReviewBtn" class="btn">Отправить</button></div>`;
        document.getElementById("mainContent").innerHTML = html;
        let selectedRating = 0;
        const starsContainer = document.getElementById("reviewStars");
        if (starsContainer) {
            const updateStarsUI = (rating) => {
                const allStars = starsContainer.querySelectorAll('.star');
                allStars.forEach(star => { if (parseInt(star.dataset.value) <= rating) star.classList.add('active'); else star.classList.remove('active'); });
            };
            starsContainer.addEventListener('click', (e) => {
                const star = e.target.closest('.star');
                if (star) { selectedRating = parseInt(star.dataset.value); updateStarsUI(selectedRating); }
            });
            updateStarsUI(0);
        }
        document.getElementById("submitReviewBtn").onclick = async () => {
            if (!currentUser) alert("Войдите");
            else if (currentUser.isAdmin) alert("Администратор не может оставлять отзывы");
            else if (!selectedRating) alert("Поставьте оценку");
            else {
                let text = document.getElementById("reviewText").value.trim();
                if (text) {
                    await addReview(selectedRating, text);
                    alert("Спасибо за отзыв!");
                } else alert("Напишите текст");
            }
        };
    }
    
    async function openProductDetail(pid) {
        let p = products.find(p=>p.id===pid);
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><span class="modal-close" onclick="this.closest('.modal').remove()">&times;</span><img src="${p.image}" style="width:100%;height:180px;object-fit:cover;border-radius:20px;"><h2>${p.name}</h2><p>💰 ${p.price}₽ | 🔥 ${p.calories}</p><p>${p.description}</p><p>🥄 ${p.composition}</p><button class="btn" onclick="addToCart('${p.id}');this.closest('.modal').remove()">В корзину</button><div style="margin-top:20px;"><h3>💬 Комментарии</h3><div id="commentsList"></div><textarea id="commentText" placeholder="Ваш комментарий..." rows="2"></textarea><button class="btn" onclick="addProductComment('${pid}')">Отправить</button></div></div>`;
        document.body.appendChild(modal);
        // Подписка на комментарии
        subscribeToProductComments(pid, (comments) => {
            const commentsDiv = document.getElementById("commentsList");
            if (commentsDiv) {
                commentsDiv.innerHTML = comments.map(c => `<div style="background:var(--cream); border-radius:16px; padding:12px; margin-bottom:10px;"><b>${c.author}</b> <small>${new Date(c.date).toLocaleString()}</small><div>${c.text}</div></div>`).join('') || '<p>Нет комментариев</p>';
            }
        });
    }
    
    async function addProductComment(productId) {
        let text = document.getElementById("commentText")?.value.trim();
        if (!text) { alert("Напишите комментарий"); return; }
        if (!currentUser) { alert("Войдите"); return; }
        await db.collection("productComments").doc(productId).collection("comments").add({
            author: currentUser.username,
            text: text,
            date: new Date().toISOString()
        });
        document.getElementById("commentText").value = "";
        alert("Комментарий добавлен");
    }
    
    // АДМИН-ПАНЕЛЬ (упрощённо, но с сохранением в Firestore)
    async function renderAdminPanel() {
        const main = document.getElementById("mainContent");
        if (currentAdminTab === "orders") {
            let activeOrders = orders.filter(o => o.status !== "Доставлен" && o.status !== "Отменён");
            let completedOrders = orders.filter(o => o.status === "Доставлен" || o.status === "Отменён");
            let displayOrders = currentOrderFilter === "active" ? activeOrders : completedOrders;
            main.innerHTML = `<div class="admin-panel-container"><div class="orders-layout"><div class="orders-sidebar"><button class="order-side-btn ${currentOrderFilter === 'active' ? 'active' : ''}" onclick="currentOrderFilter='active'; renderAdminPanel();">🟡 Активные (${activeOrders.length})</button><button class="order-side-btn ${currentOrderFilter === 'completed' ? 'active' : ''}" onclick="currentOrderFilter='completed'; renderAdminPanel();">✅ Выполненные (${completedOrders.length})</button></div><div class="orders-content"><div class="orders-table-container"><table class="orders-table"><thead><tr><th>№</th><th>Клиент</th><th>Дата</th><th>Товары</th><th>Сумма</th><th>Статус</th><th>Действие</th><th>Чат</th></tr></thead><tbody>${displayOrders.map(o => `<tr><td>${getShortId(o.id)}</td><td>${o.userName || o.userId}</td><td>${new Date(o.date).toLocaleString()}</td><td>${o.items.map(i=>`${i.name} x${i.quantity}`).join(', ')}</td><td><b>${o.total}₽</b></td><td><span class="status-badge status-${o.status}">${o.status}</span></td><td><select onchange="updateOrderStatus('${o.id}',this.value)"><option ${o.status==='Принят'?'selected':''}>Принят</option><option ${o.status==='Готовится'?'selected':''}>Готовится</option><option ${o.status==='Доставлен'?'selected':''}>Доставлен</option><option ${o.status==='Отменён'?'selected':''}>Отменён</option></select></td><td><button class="chat-link-btn" onclick="openChatWithUser('${o.userId}')"><i class="fas fa-comment"></i> Чат</button></td></tr>`).join('')}</tbody></table></div></div></div></div>`;
        } else if (currentAdminTab === "products") {
            main.innerHTML = `<div class="admin-panel-container"><div class="admin-tabs"><button id="addProductTabBtn" class="admin-tab-btn ${currentProductsSubTab === 'add' ? 'active' : ''}">➕ Добавление</button><button id="editProductTabBtn" class="admin-tab-btn ${currentProductsSubTab === 'edit' ? 'active' : ''}">✏️ Редактирование</button></div>
            <div id="addProductSection" class="admin-section ${currentProductsSubTab === 'add' ? 'active' : ''}"><div style="background:var(--rose); padding:16px; border-radius:24px;"><h4>➕ Новое блюдо</h4><select id="adminCategory">${categories.map(c=>`<option>${c}</option>`).join('')}</select><input type="text" id="adminName" placeholder="Название"><textarea id="adminDesc" placeholder="Описание" rows="2"></textarea><input type="text" id="adminComposition" placeholder="Состав"><input type="text" id="adminCalories" placeholder="Калории"><input type="text" id="adminPriceDefault" placeholder="Цена"><input type="file" id="adminImageFile" accept="image/*"><div id="imagePreview"></div><button id="addProductBtn" class="btn">✅ Добавить</button></div></div>
            <div id="editProductSection" class="admin-section ${currentProductsSubTab === 'edit' ? 'active' : ''}"><h4>✏️ Редактирование товаров</h4><div id="adminProductList"></div></div></div>`;
            document.getElementById("addProductTabBtn").onclick = () => { currentProductsSubTab = "add"; renderAdminPanel(); };
            document.getElementById("editProductTabBtn").onclick = () => { currentProductsSubTab = "edit"; renderAdminPanel(); };
            document.getElementById("adminProductList").innerHTML = products.map(p => `<div class="product-edit-card"><div class="flex-between"><img src="${p.image}" style="width:50px;height:50px;border-radius:10px;object-fit:cover;"><div><strong>${p.name}</strong><br>${p.price}₽</div><button onclick="editProduct('${p.id}')" class="btn" style="width:auto;padding:6px 14px;">✏️</button><button onclick="deleteProduct('${p.id}')" class="btn" style="width:auto;padding:6px 14px;background:#999;">🗑️</button></div></div>`).join('');
            // Обработка добавления товара с загрузкой фото в Storage
            let uploadedFile = null;
            const imageInput = document.getElementById("adminImageFile");
            if (imageInput) imageInput.onchange = e => { uploadedFile = e.target.files[0]; if(uploadedFile) document.getElementById("imagePreview").innerHTML = `<img src="${URL.createObjectURL(uploadedFile)}" style="max-width:150px;border-radius:12px; margin-top:8px;">`; };
            const addBtn = document.getElementById("addProductBtn");
            if (addBtn) addBtn.onclick = async () => {
                let name = document.getElementById("adminName")?.value.trim();
                if (!name || !uploadedFile) { alert("Название и фото обязательны"); return; }
                // Загружаем фото в Storage
                const storageRef = storage.ref(`products/${Date.now()}_${uploadedFile.name}`);
                await storageRef.put(uploadedFile);
                const imageUrl = await storageRef.getDownloadURL();
                await db.collection("products").add({
                    name: name,
                    category: document.getElementById("adminCategory")?.value,
                    description: document.getElementById("adminDesc")?.value,
                    composition: document.getElementById("adminComposition")?.value,
                    calories: document.getElementById("adminCalories")?.value,
                    price: parseInt(document.getElementById("adminPriceDefault")?.value) || 250,
                    image: imageUrl
                });
                alert("Товар добавлен!");
                renderAdminPanel();
            };
        } else if (currentAdminTab === "chats") {
            renderChatsPanel(main);
        }
    }
    
    async function deleteProduct(productId) {
        if (confirm("Удалить товар?")) {
            await db.collection("products").doc(productId).delete();
            alert("Удалено");
        }
    }
    
    async function editProduct(productId) {
        const p = products.find(p=>p.id===productId);
        if (!p) return;
        let newName = prompt("Новое название", p.name);
        let newPrice = prompt("Новая цена", p.price);
        if (newName && newPrice) {
            await db.collection("products").doc(productId).update({ name: newName, price: parseInt(newPrice) });
            alert("Обновлено");
        }
    }
    
    function renderChatsPanel(main) {
        main.innerHTML = `<div class="admin-panel-container"><h2><i class="fas fa-comments"></i> Чаты с клиентами</h2><div id="adminChatPlaceholder">Выберите пользователя из списка заказов</div></div>`;
        // Для простоты чаты открываются через кнопку в заказах
    }
    
    window.openChatWithUser = async (userId) => {
        // Открыть модальное окно чата с конкретным пользователем
        let chatId = userId;
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content" style="max-width:600px;"><span class="modal-close" onclick="this.closest('.modal').remove()">&times;</span><h3>Чат с пользователем</h3><div id="chatMessagesList" style="height:300px; overflow-y:auto; background:#f9f3e9; padding:10px; border-radius:20px;"></div><div class="chat-input-area-admin"><input type="text" id="adminChatMsg" placeholder="Сообщение..."><button id="sendChatMsgBtn" class="btn">Отправить</button></div></div>`;
        document.body.appendChild(modal);
        // Подписка на сообщения
        let unsubscribe = subscribeToChat(chatId, true, (messages) => {
            const container = document.getElementById("chatMessagesList");
            if (container) {
                container.innerHTML = messages.map(msg => {
                    const isMy = msg.from === "ilimi_admin";
                    return `<div class="chat-message ${isMy ? 'my' : 'other'}"><div class="message-sender">${isMy ? 'Вы' : msg.from}</div><div class="message-bubble">${escapeHtml(msg.text)}</div><div class="message-time">${new Date(msg.time).toLocaleString()}</div></div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            }
        });
        document.getElementById("sendChatMsgBtn").onclick = async () => {
            let text = document.getElementById("adminChatMsg").value.trim();
            if (!text) return;
            await db.collection("privateMessages").doc(chatId).collection("messages").add({
                from: "ilimi_admin",
                text: text,
                time: Date.now(),
                readByAdmin: true,
                readByUser: false
            });
            document.getElementById("adminChatMsg").value = "";
        };
        modal.onclose = () => unsubscribe();
    };
    
    // Функции для пользовательского чата
    async function sendUserMessage() {
        if (!currentUser) return;
        let input = document.getElementById("userChatInput");
        let text = input?.value.trim();
        if (!text) return;
        await db.collection("privateMessages").doc(currentUser.uid).collection("messages").add({
            from: currentUser.username,
            text: text,
            time: Date.now(),
            readByAdmin: false,
            readByUser: true
        });
        input.value = "";
    }
    
    function loadUserChatMessages() {
        if (!currentUser) return;
        const container = document.getElementById("userChatMessages");
        if (!container) return;
        subscribeToChat(currentUser.uid, false, (messages) => {
            container.innerHTML = messages.map(msg => {
                const isMy = msg.from === currentUser.username;
                const sender = isMy ? "Вы" : "👑 Администратор";
                return `<div class="chat-message ${isMy ? 'my' : 'other'}"><div class="message-sender">${sender}</div><div class="message-bubble">${escapeHtml(msg.text)}</div><div class="message-time">${new Date(msg.time).toLocaleString()}</div></div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
            updateUserChatUnread();
        });
    }
    
    function updateUserChatUnread() { /* можно реализовать через отдельный слушатель */ }
    function updateAdminOrderBadge() {}
    function updateOrderStatusBar() {
        if (!currentUser || currentUser.isAdmin) return;
        const activeOrder = orders.find(o => o.userId === currentUser.uid && o.status !== "Доставлен" && o.status !== "Отменён");
        const bar = document.getElementById("orderStatusBar");
        if (activeOrder) {
            bar.innerHTML = activeOrder.status === "Принят" ? "⏳ Ваш заказ принят, скоро начнём готовить!" : "👩‍🍳 Ваш заказ готовится!";
            bar.className = `order-status-bar ${activeOrder.status}`;
            bar.style.display = "block";
        } else bar.style.display = "none";
    }
    
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    window.togglePassword = (id) => { let inp = document.getElementById(id); inp.type = inp.type === "password" ? "text" : "password"; };
    
    // Инициализация после сплеша
    document.getElementById("goToShopBtn").addEventListener("click", async () => {
        let splash = document.getElementById("splashScreen");
        if (splash) {
            splash.style.opacity = "0";
            setTimeout(() => { splash.style.display = "none"; document.getElementById("mainSite").style.display = "block"; initApp(); }, 800);
        }
    });
    
    async function initApp() {
        // Проверяем, есть ли сохранённый пользователь
        const saved = localStorage.getItem("ilimi_current_user");
        if (saved) {
            try {
                const { uid } = JSON.parse(saved);
                const userDoc = await db.collection("users").doc(uid).get();
                if (userDoc.exists) {
                    let data = userDoc.data();
                    currentUser = {
                        uid: uid,
                        username: data.username,
                        email: data.email,
                        phone: data.phone,
                        address: data.address,
                        avatar: data.avatar,
                        isAdmin: data.isAdmin || false
                    };
                }
            } catch(e) {}
        }
        loadCartFromSession();
        // Подписки
        subscribeToProducts();
        if (currentUser) {
            subscribeToOrders();
        }
        subscribeToReviews();
        // Навешиваем обработчики UI
        document.getElementById("floatingCart").onclick = () => renderCartModal();
        document.getElementById("checkoutBtn").onclick = checkout;
        document.getElementById("editAddressBtn").onclick = () => {
            let div = document.getElementById("addressInputDiv");
            if(div) { div.style.display = "flex"; let inp = document.getElementById("deliveryAddress"); if(inp) inp.value = currentUser?.address || ""; }
        };
        document.getElementById("saveAddressBtn").onclick = async () => {
            let newAddr = document.getElementById("deliveryAddress")?.value.trim();
            if (newAddr && currentUser) {
                await db.collection("users").doc(currentUser.uid).update({ address: newAddr });
                currentUser.address = newAddr;
                document.getElementById("savedAddress").innerText = newAddr;
                document.getElementById("addressInputDiv").style.display = "none";
                alert("Адрес сохранён!");
            }
        };
        document.getElementById("userAreaBtn").onclick = (e) => {
            if(e.target.closest('#logoutHeaderBtn')) return;
            if(currentUser) renderUserProfileFull();
            else document.getElementById("authModal").style.display = "flex";
        };
        document.getElementById("logoutHeaderBtn").onclick = (e) => { e.stopPropagation(); logout(); };
        document.getElementById("homeLink").onclick = () => { currentPage = "menu"; renderPage(); };
        document.getElementById("profileLink").onclick = () => { if(currentUser) renderUserProfileFull(); else document.getElementById("authModal").style.display = "flex"; };
        document.getElementById("ordersLink").onclick = () => { if(currentUser) { currentPage = "orders"; renderPage(); } else document.getElementById("authModal").style.display = "flex"; };
        document.getElementById("reviewsLink").onclick = () => { currentPage = "reviews"; renderPage(); };
        document.getElementById("doLoginBtn").onclick = () => { let u=document.getElementById("loginUsername").value, p=document.getElementById("loginPassword").value; if(u && p) login(u,p); };
        document.getElementById("doRegisterBtn").onclick = () => { let u=document.getElementById("regUsername").value, p=document.getElementById("regPassword").value, e=document.getElementById("regEmail").value, ph=document.getElementById("regPhone").value; if(u && p) register(u,p,e,ph); };
        document.getElementById("forgotPasswordLink").onclick = () => { closeModal('authModal'); document.getElementById("restoreModal").style.display="flex"; };
        document.getElementById("doRestoreBtn").onclick = async () => {
            let contact = document.getElementById("restoreContact").value;
            let userQuery = await db.collection("users").where("email","==",contact).get();
            if (userQuery.empty) userQuery = await db.collection("users").where("phone","==",contact).get();
            if (!userQuery.empty) {
                let user = userQuery.docs[0].data();
                alert(`Ваш пароль: ${user.password}`);
                closeModal('restoreModal');
            } else alert("Не найден");
        };
        document.getElementById("loginTab").onclick = () => { document.getElementById("loginForm").style.display="block"; document.getElementById("registerForm").style.display="none"; };
        document.getElementById("registerTab").onclick = () => { document.getElementById("loginForm").style.display="none"; document.getElementById("registerForm").style.display="block"; };
        
        const toggle = document.getElementById("userChatToggle");
        const windowChat = document.getElementById("userChatWindow");
        const closeChat = document.getElementById("userChatCloseBtn");
        const sendBtn = document.getElementById("userSendChatBtn");
        if (toggle) toggle.onclick = () => { if(windowChat.style.display === "block") windowChat.style.display = "none"; else { windowChat.style.display = "block"; loadUserChatMessages(); } };
        if (closeChat) closeChat.onclick = () => { windowChat.style.display = "none"; };
        if (sendBtn) sendBtn.onclick = sendUserMessage;
        document.getElementById("userChatInput").onkeypress = (e) => { if(e.key === "Enter") sendUserMessage(); };
        
        updateUI();
    }
    
    function renderUserProfileFull() {
        if(!currentUser) return;
        let modal = document.createElement('div');
        modal.className = 'fullscreen-modal';
        modal.innerHTML = `<div class="fullscreen-content"><span class="profile-close-btn" onclick="this.closest('.fullscreen-modal').remove()">&times;</span>
        <div style="text-align:center;"><img src="${currentUser.avatar || 'https://placehold.co/100x100/f2e6d8/8b5a3c?text=👤'}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;"><input type="file" id="profileAvatarUpload" style="margin-top:10px; font-size:0.8rem;"></div>
        <div class="profile-card"><h3>👤 Личные данные</h3>
        <div class="profile-info-row"><span class="profile-info-label">Логин:</span><span class="profile-info-value">${currentUser.username}</span><button class="profile-edit-btn" onclick="editProfileField('username')">✏️</button></div>
        <div class="profile-info-row"><span class="profile-info-label">Email:</span><span class="profile-info-value">${currentUser.email || '—'}</span><button class="profile-edit-btn" onclick="editProfileField('email')">✏️</button></div>
        <div class="profile-info-row"><span class="profile-info-label">Телефон:</span><span class="profile-info-value">${currentUser.phone || '—'}</span><button class="profile-edit-btn" onclick="editProfileField('phone')">✏️</button></div>
        <div class="profile-info-row"><span class="profile-info-label">Адрес:</span><span class="profile-info-value">${currentUser.address || 'Не указан'}</span><button class="profile-edit-btn" onclick="editProfileField('address')">✏️</button></div>
        <div class="profile-info-row"><span class="profile-info-label">Пароль:</span><span class="profile-info-value">••••••</span><button class="profile-edit-btn" onclick="editProfileField('password')">✏️</button></div>
        </div></div>`;
        document.body.appendChild(modal);
        window.editProfileField = async (field) => {
            let newVal = prompt(`Введите новый ${field}:`, currentUser[field] || '');
            if (newVal !== null) {
                let updateData = {};
                if (field === 'password') updateData.password = newVal;
                else updateData[field] = newVal;
                await db.collection("users").doc(currentUser.uid).update(updateData);
                if (field !== 'password') currentUser[field] = newVal;
                else currentUser.password = newVal;
                modal.remove();
                renderUserProfileFull();
                alert(`${field} обновлён`);
            }
        };
        document.getElementById("profileAvatarUpload").onchange = e => { let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onload=async ev=>{ await db.collection("users").doc(currentUser.uid).update({ avatar: ev.target.result }); currentUser.avatar=ev.target.result; modal.remove(); renderUserProfileFull(); }; r.readAsDataURL(f); } };
    }
    
    window.filterMenuDebounced = () => {
        if(debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            let input = document.getElementById("menuSearchInput");
            if(input) { menuSearchQuery = input.value; renderMenu(); }
        }, 300);
    };
    window.updateOrderStatus = updateOrderStatus;
    window.updateCartItem = updateCartItem;
</script>
<footer><p>ilimi — домашняя кондитерская | Админ: ilimi_admin / ilimi2024</p></footer>
